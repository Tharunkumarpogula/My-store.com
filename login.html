<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ModernShop</title>
    <meta name="description" content="Login to your ModernShop account to access your orders and personalized shopping experience.">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="login-page">
    <!-- Loading Screen -->
    <div id="loading-screen" class="loading-screen">
        <div class="loading-content">
            <div class="spinner"></div>
            <h2>ModernShop</h2>
            <p>Loading your shopping experience...</p>
        </div>
    </div>

    <!-- Login Container -->
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <h1>Welcome to <span>ModernShop</span></h1>
                <p>Sign in to your account</p>
            </div>
            
            <div class="login-form-container">
                <!-- Login Form -->
                <form id="login-form" class="auth-form active">
                    <div class="form-group">
                        <label for="login-email">Email Address</label>
                        <div class="input-with-icon">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="login-email" placeholder="Enter your email" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <div class="input-with-icon">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="login-password" placeholder="Enter your password" required>
                            <i class="fas fa-eye toggle-password" onclick="togglePassword('login-password')"></i>
                        </div>
                    </div>
                    
                    <div class="form-options">
                        <div class="remember-me">
                            <input type="checkbox" id="remember">
                            <label for="remember">Remember me</label>
                        </div>
                        <a href="#" class="forgot-password">Forgot Password?</a>
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-block">Login</button>
                    
                    <div class="divider">
                        <span>or</span>
                    </div>
                    
                    <button type="button" class="btn btn-secondary btn-block google-login">
                        <i class="fab fa-google"></i> Continue with Google
                    </button>
                </form>
                
                <!-- Signup Form -->
                <form id="signup-form" class="auth-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="first-name">First Name</label>
                            <div class="input-with-icon">
                                <i class="fas fa-user"></i>
                                <input type="text" id="first-name" placeholder="First name" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="last-name">Last Name</label>
                            <div class="input-with-icon">
                                <i class="fas fa-user"></i>
                                <input type="text" id="last-name" placeholder="Last name" required>
                            </div>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="signup-email">Email Address</label>
                        <div class="input-with-icon">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="signup-email" placeholder="Enter your email" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <div class="input-with-icon">
                            <i class="fas fa-phone"></i>
                            <input type="tel" id="phone" placeholder="Enter your phone number" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="signup-password">Password</label>
                        <div class="input-with-icon">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="signup-password" placeholder="Create password" required>
                            <i class="fas fa-eye toggle-password" onclick="togglePassword('signup-password')"></i>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="confirm-password">Confirm Password</label>
                        <div class="input-with-icon">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="confirm-password" placeholder="Confirm password" required>
                            <i class="fas fa-eye toggle-password" onclick="togglePassword('confirm-password')"></i>
                        </div>
                    </div>
                    
                    <!-- OTP Section -->
                    <div class="otp-section" id="otp-section" style="display: none;">
                        <div class="form-group">
                            <label for="otp">Enter OTP sent to your phone</label>
                            <div class="input-with-icon">
                                <i class="fas fa-key"></i>
                                <input type="text" id="otp" placeholder="Enter 6-digit OTP" maxlength="6">
                            </div>
                            <div class="otp-actions">
                                <button type="button" class="btn btn-secondary btn-block" id="resend-otp">Resend OTP</button>
                                <button type="button" class="btn btn-outline btn-block" id="skip-otp">Skip OTP (Demo)</button>
                            </div>
                        </div>
                    </div>
                    
                    <div class="terms">
                        <input type="checkbox" id="terms" required>
                        <label for="terms">I agree to the <a href="#">Terms & Conditions</a> and <a href="#">Privacy Policy</a></label>
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-block" id="signup-submit-btn">Create Account</button>
                </form>
            </div>
            
            <div class="auth-toggle">
                <p>Don't have an account? <a href="#" id="show-signup">Sign Up</a></p>
                <p>Already have an account? <a href="#" id="show-login">Login</a></p>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        // Toggle between login and signup forms
        document.getElementById('show-signup').addEventListener('click', function(e) {
            e.preventDefault();
            document.getElementById('login-form').classList.remove('active');
            document.getElementById('signup-form').classList.add('active');
        });
        
        document.getElementById('show-login').addEventListener('click', function(e) {
            e.preventDefault();
            document.getElementById('signup-form').classList.remove('active');
            document.getElementById('login-form').classList.add('active');
        });
        
        // Password toggle function
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const icon = input.nextElementSibling;
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
        
        // Form submissions
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            
            // Basic validation
            if (!email || !password) {
                showNotification('Please fill in all fields', 'error');
                return;
            }
            
            if (!isValidEmail(email)) {
                showNotification('Please enter a valid email address', 'error');
                return;
            }
            
            showLoading();
            setTimeout(() => {
                localStorage.setItem('userLoggedIn', 'true');
                localStorage.setItem('userEmail', email); // Save user's email
                showNotification('Login successful!', 'success');
                
                // Merge guest cart with user's saved cart if any
                const guestCart = JSON.parse(localStorage.getItem('cart') || '[]');
                const userCart = JSON.parse(localStorage.getItem(`cart_${email}`) || '[]');
                
                // Combine carts
                let combinedCart = [...guestCart];
                
                userCart.forEach(userItem => {
                    const existingItem = combinedCart.find(item => item.id == userItem.id);
                    if (existingItem) {
                        existingItem.quantity += userItem.quantity;
                    } else {
                        combinedCart.push(userItem);
                    }
                });
                
                // Save combined cart
                localStorage.setItem('cart', JSON.stringify(combinedCart));
                localStorage.setItem(`cart_${email}`, JSON.stringify(combinedCart));
                
                window.location.href = 'index.html';
            }, 2000);
        });
        
        // Signup form with OTP
        document.getElementById('signup-submit-btn').addEventListener('click', function(e) {
            e.preventDefault();
            const firstName = document.getElementById('first-name').value;
            const lastName = document.getElementById('last-name').value;
            const email = document.getElementById('signup-email').value;
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('signup-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            
            // Validation
            if (!firstName || !lastName || !email || !phone || !password) {
                showNotification('Please fill in all required fields', 'error');
                return;
            }
            
            if (!isValidEmail(email)) {
                showNotification('Please enter a valid email address', 'error');
                return;
            }
            
            if (password !== confirmPassword) {
                showNotification('Passwords do not match!', 'error');
                return;
            }
            
            if (password.length < 6) {
                showNotification('Password must be at least 6 characters!', 'error');
                return;
            }
            
            // Generate demo OTP
            const demoOTP = '123456'; // Fixed demo OTP for testing
            localStorage.setItem('demoOTP', demoOTP);
            
            // Show OTP section
            document.getElementById('otp-section').style.display = 'block';
            this.textContent = 'Verify OTP';
            this.onclick = verifyOTP;
            
            // Show demo OTP for testing
            showNotification(`Demo OTP: ${demoOTP} (Enter this to test)`, 'success');
        });
        
        // OTP verification
        function verifyOTP(e) {
            e.preventDefault();
            const otp = document.getElementById('otp').value;
            const demoOTP = localStorage.getItem('demoOTP');
            const email = document.getElementById('signup-email').value;
            
            if (otp !== demoOTP) {
                showNotification('Invalid OTP! Demo OTP is 123456', 'error');
                return;
            }
            
            if (otp.length !== 6) {
                showNotification('Please enter a valid 6-digit OTP!', 'error');
                return;
            }
            
            showLoading();
            setTimeout(() => {
                localStorage.setItem('userLoggedIn', 'true');
                localStorage.setItem('userEmail', email); // Save user's email
                localStorage.removeItem('demoOTP');
                showNotification('Account created successfully!', 'success');
                
                // Initialize user's cart storage
                const guestCart = JSON.parse(localStorage.getItem('cart') || '[]');
                localStorage.setItem(`cart_${email}`, JSON.stringify(guestCart));
                
                window.location.href = 'index.html';
            }, 2000);
        }
        
        // Validate email format
        function isValidEmail(email) {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return emailRegex.test(email);
        }
        
        // Resend OTP
        document.getElementById('resend-otp').addEventListener('click', function() {
            const demoOTP = localStorage.getItem('demoOTP') || '123456';
            showNotification(`OTP resent! Demo OTP: ${demoOTP}`, 'success');
        });
        
        // Skip OTP for demo
        document.getElementById('skip-otp').addEventListener('click', function() {
            showLoading();
            setTimeout(() => {
                localStorage.setItem('userLoggedIn', 'true');
                localStorage.removeItem('demoOTP');
                showNotification('Account created successfully! (OTP skipped for demo)', 'success');
                window.location.href = 'index.html';
            }, 1500);
        });
        
        // Loading screen
        function showLoading() {
            document.getElementById('loading-screen').style.display = 'flex';
        }
        
        // Hide loading screen after page load
        window.addEventListener('load', function() {
            setTimeout(() => {
                document.getElementById('loading-screen').style.display = 'none';
            }, 1500);
        });
        
        // Enhanced notification system
        function showNotification(message, type = 'success') {
            // Remove existing notifications
            const existing = document.querySelectorAll('.notification');
            existing.forEach(el => el.remove());
            
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.innerHTML = `
                <div style="display: flex; align-items: center; gap: 10px;">
                    <i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i>
                    <span>${message}</span>
                </div>
            `;
            
            document.body.appendChild(notification);
            
            setTimeout(() => notification.classList.add('show'), 100);
            
            setTimeout(() => {
                notification.classList.remove('show');
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }
    </script>
</body>
</html>
