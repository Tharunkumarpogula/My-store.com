<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ModernShop</title>
    <meta name="description"
        content="Login to your ModernShop account to access your orders and personalized shopping experience.">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="login-page">
    <!-- Loading Screen -->
    <div id="loading-screen" class="loading-screen">
        <div class="loading-content">
            <div class="spinner"></div>
            <h2>ModernShop</h2>
            <p>Loading your shopping experience...</p>
        </div>
    </div>

    <!-- Login Container -->
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <h1>Welcome to <span>ModernShop</span></h1>
                <p>Sign in to your account</p>
            </div>

            <div class="login-form-container">
                <!-- Login Form -->
                <form id="login-form" class="auth-form active">
                    <div class="form-group">
                        <label for="login-email">Email Address</label>
                        <div class="input-with-icon">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="login-email" placeholder="Enter your email" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <div class="input-with-icon">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="login-password" placeholder="Enter your password" required>
                            <i class="fas fa-eye toggle-password" onclick="togglePassword('login-password')"></i>
                        </div>
                    </div>

                    <div class="form-options">
                        <div class="remember-me">
                            <input type="checkbox" id="remember">
                            <label for="remember">Remember me</label>
                        </div>
                        <a href="#" class="forgot-password">Forgot Password?</a>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block">Login</button>

                    <div class="divider">
                        <span>or</span>
                    </div>

                    <button type="button" class="btn btn-secondary btn-block google-login">
                        <i class="fab fa-google"></i> Continue with Google
                    </button>
                </form>

                <!-- Signup Form -->
                <form id="signup-form" class="auth-form">
                    <div class="role-selector">
                        <div class="role-tab active customer" data-role="customer" onclick="setRole('customer')">
                            <i class="fas fa-user"></i> Consumer
                        </div>
                        <div class="role-tab retailer" data-role="retailer" onclick="setRole('retailer')">
                            <i class="fas fa-store"></i> Retailer
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="first-name">First Name</label>
                            <div class="input-with-icon">
                                <i class="fas fa-user"></i>
                                <input type="text" id="first-name" placeholder="First name" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="last-name">Last Name</label>
                            <div class="input-with-icon">
                                <i class="fas fa-user"></i>
                                <input type="text" id="last-name" placeholder="Last name" required>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="signup-email">Email Address</label>
                        <div class="input-with-icon">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="signup-email" placeholder="Enter your email" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <div class="input-with-icon">
                            <i class="fas fa-phone"></i>
                            <input type="tel" id="phone" placeholder="Enter your phone number" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="signup-password">Password</label>
                        <div class="input-with-icon">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="signup-password" placeholder="Create password" required>
                            <i class="fas fa-eye toggle-password" onclick="togglePassword('signup-password')"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="confirm-password">Confirm Password</label>
                        <div class="input-with-icon">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="confirm-password" placeholder="Confirm password" required>
                            <i class="fas fa-eye toggle-password" onclick="togglePassword('confirm-password')"></i>
                        </div>
                    </div>

                    <!-- Retailer Specific Fields -->
                    <div id="retailer-fields" style="display: none;">
                        <div class="form-group">
                            <label for="business-mode">Business Mode</label>
                            <div class="input-with-icon">
                                <i class="fas fa-briefcase"></i>
                                <select id="business-mode">
                                    <option value="B2C">B2C (Business to Consumer)</option>
                                    <option value="B2B">B2B (Business to Business)</option>
                                    <option value="Both">Both</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="shop-category">Shop Category</label>
                            <div class="input-with-icon">
                                <i class="fas fa-tag"></i>
                                <select id="shop-category">
                                    <option value="electronics">Electronics</option>
                                    <option value="fashion">Fashion</option>
                                    <option value="home-kitchen">Home & Kitchen</option>
                                    <option value="beauty">Beauty</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Verification (Photo ID)</label>
                            <div class="file-upload-placeholder">
                                <i class="fas fa-cloud-upload-alt"></i>
                                <span>Upload Aadhar/PAN or Business ID</span>
                                <input type="file" id="photo-id" style="display:none">
                            </div>
                        </div>
                    </div>

                    <!-- OTP Section -->
                    <div class="otp-section" id="otp-section" style="display: none;">
                        <div class="form-group">
                            <label for="otp">Enter OTP sent to your phone</label>
                            <div class="input-with-icon">
                                <i class="fas fa-key"></i>
                                <input type="text" id="otp" placeholder="Enter 6-digit OTP" maxlength="6">
                            </div>
                            <div class="otp-actions">
                                <button type="button" class="btn btn-secondary btn-block" id="resend-otp">Resend
                                    OTP</button>
                                <button type="button" class="btn btn-outline btn-block" id="skip-otp">Skip OTP
                                    (Demo)</button>
                            </div>
                        </div>
                    </div>

                    <div class="terms">
                        <input type="checkbox" id="terms" required>
                        <label for="terms">I agree to the <a href="#">Terms & Conditions</a> and <a href="#">Privacy
                                Policy</a></label>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block" id="signup-submit-btn">Create
                        Account</button>

                    <div class="divider">
                        <span>or</span>
                    </div>

                    <button type="button" class="btn btn-secondary btn-block google-login">
                        <i class="fab fa-google"></i> Continue with Google
                    </button>
                </form>
            </div>

            <div class="auth-toggle">
                <p>Don't have an account? <a href="#" id="show-signup">Sign Up</a></p>
                <p>Already have an account? <a href="#" id="show-login">Login</a></p>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        // Use global API_URL from main.js
        const AUTH_API = API_URL;

        // Role Toggling
        function setRole(role) {
            document.querySelectorAll('.role-tab').forEach(tab => tab.classList.remove('active'));
            document.querySelector(`.role-tab.${role}`).classList.add('active');

            const retailerFields = document.getElementById('retailer-fields');
            if (role === 'retailer') {
                retailerFields.style.display = 'block';
                retailerFields.querySelectorAll('input, select').forEach(el => el.required = true);
            } else {
                retailerFields.style.display = 'none';
                retailerFields.querySelectorAll('input, select').forEach(el => el.required = false);
            }
        }

        // Toggle between login and signup forms
        document.getElementById('show-signup').addEventListener('click', function (e) {
            e.preventDefault();
            document.getElementById('login-form').classList.remove('active');
            document.getElementById('signup-form').classList.add('active');
            document.getElementById('show-signup').parentElement.style.display = 'none';
            document.getElementById('show-login').parentElement.style.display = 'block';
        });

        document.getElementById('show-login').addEventListener('click', function (e) {
            e.preventDefault();
            document.getElementById('signup-form').classList.remove('active');
            document.getElementById('login-form').classList.add('active');
            document.getElementById('show-login').parentElement.style.display = 'none';
            document.getElementById('show-signup').parentElement.style.display = 'block';
        });

        // Form submissions
        document.getElementById('login-form').addEventListener('submit', async function (e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            showLoading();

            try {
                const response = await fetch(`${AUTH_API}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();
                if (!response.ok) throw new Error(data.error || 'Login failed');

                localStorage.setItem('userLoggedIn', 'true');
                localStorage.setItem('userEmail', data.email);
                localStorage.setItem('username', data.username);
                localStorage.setItem('userId', data.id);
                localStorage.setItem('userRole', data.role);

                showNotification('Login successful!', 'success');

                setTimeout(() => {
                    if (data.role === 'retailer') {
                        window.location.href = 'dashboard.html';
                    } else {
                        window.location.href = 'index.html';
                    }
                }, 1000);
            } catch (error) {
                hideLoading();
                showNotification(error.message, 'error');
            }
        });

        // Signup form submission
        document.getElementById('signup-form').addEventListener('submit', async function (e) {
            e.preventDefault();
            const firstName = document.getElementById('first-name').value;
            const lastName = document.getElementById('last-name').value;
            const email = document.getElementById('signup-email').value;
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('signup-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const role = document.querySelector('.role-tab.active').dataset.role;

            if (password !== confirmPassword) {
                showNotification('Passwords do not match!', 'error');
                return;
            }

            const payload = {
                username: `${firstName} ${lastName}`,
                email,
                mobileNumber: phone,
                password,
                role
            };

            if (role === 'retailer') {
                payload.businessMode = document.getElementById('business-mode').value;
                payload.shopCategory = document.getElementById('shop-category').value;
                payload.photoIdUrl = 'file://placeholder-id.jpg'; // Mock for now
            }

            showLoading();

            try {
                const response = await fetch(`${AUTH_API}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                if (!response.ok) throw new Error(data.error || 'Registration failed');

                showNotification('Account created successfully!', 'success');

                // Auto-login
                localStorage.setItem('userLoggedIn', 'true');
                localStorage.setItem('userEmail', data.email);
                localStorage.setItem('username', data.username);
                localStorage.setItem('userRole', data.role);

                setTimeout(() => {
                    if (data.role === 'retailer') {
                        window.location.href = 'dashboard.html';
                    } else {
                        window.location.href = 'index.html';
                    }
                }, 1500);
            } catch (error) {
                hideLoading();
                showNotification(error.message, 'error');
            }
        });

        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const icon = input.nextElementSibling;
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
    </script>
</body>

</html>
